services:
  facilitator:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${ACP_PORT:-8181}:8181"
    environment:
      - ACP_ADDR=:8181
      - ACP_LOG_LEVEL=${ACP_LOG_LEVEL:-info}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8181/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    profiles:
      - with-redis

volumes:
  redis-data:
